<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admissions - WIN Academy</title>
    <link rel="stylesheet" href="/css/styles.css">
</head>
<body>
    <nav class="navbar">
        <div class="logo-section">
            <img src="/assets/logo.png" alt="WIN Academy Logo" class="logo">
            <h2>WIN Academy</h2>
        </div>
        <ul class="nav-links" id="nav-links">
            <li><a href="/index.html">Home</a></li>
            <li><a href="/pages/admission.html">Admissions</a></li>
            <li><a href="/pages/result.html">Results</a></li>
        </ul>
    </nav>

    <div class="main-wrapper container">
        <div class="card" style="max-width: 600px; margin: 0 auto; margin-top: 2rem;">
            <h2 class="text-center">Online Admission Form</h2>
            <div id="message" style="margin-bottom: 1rem; color: green; font-weight: bold;"></div>
            
            <form id="admissionForm">
                <div class="form-group">
                    <label>Full Name</label>
                    <input type="text" id="name" class="form-control" required>
                </div>
                <div class="form-group">
                    <label>Date of Birth</label>
                    <input type="date" id="dob" class="form-control" required>
                </div>
                <div class="form-group">
                    <label>Select Class</label>
                    <select id="class_id" class="form-control" required>
                        <option value="">Loading classes...</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Email Address</label>
                    <input type="email" id="email" class="form-control">
                </div>
                <div class="form-group">
                    <label>Phone Number</label>
                    <input type="text" id="phone" class="form-control">
                </div>
                <div class="form-group">
                    <label>Address</label>
                    <textarea id="address" class="form-control" rows="3"></textarea>
                </div>
                <div class="form-group">
                    <label>Roll Number (Unique)</label>
                    <input type="text" id="roll_number" class="form-control" required>
                </div>
                
                <button type="submit" class="btn" style="width: 100%;">Submit Application</button>
            </form>
        </div>
    </div>

    <footer>
        <p>&copy; 2026 WIN Academy. All rights reserved.</p>
    </footer>

    <script src="/js/api.js"></script>
    <script src="/js/main.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            // Load classes dropdown
            const classSelect = document.getElementById('class_id');
            const res = await api.get('/students/classes');
            if (res && res.success) {
                classSelect.innerHTML = '<option value="">-- Select Class --</option>';
                res.data.forEach(cls => {
                    classSelect.innerHTML += `<option value="${cls.id}">${cls.class_name}</option>`;
                });
            } else {
                classSelect.innerHTML = '<option value="">Error loading classes</option>';
            }

            // Handle submission
            document.getElementById('admissionForm').addEventListener('submit', async (e) => {
                e.preventDefault();
                
                const data = {
                    name: document.getElementById('name').value,
                    dob: document.getElementById('dob').value,
                    class_id: document.getElementById('class_id').value,
                    email: document.getElementById('email').value,
                    phone: document.getElementById('phone').value,
                    address: document.getElementById('address').value,
                    roll_number: document.getElementById('roll_number').value,
                };

                const messageEl = document.getElementById('message');
                messageEl.style.color = '#333';
                messageEl.textContent = 'Submitting...';

                const result = await api.post('/students', data);
                if (result && result.success) {
                    messageEl.style.color = 'green';
                    messageEl.textContent = 'Admission Successful! Proceed to make payment if needed.';
                    document.getElementById('admissionForm').reset();
                } else {
                    messageEl.style.color = 'red';
                    messageEl.textContent = result.message || 'Admission Failed';
                }
            });
        });
    </script>
</body>
</html>
